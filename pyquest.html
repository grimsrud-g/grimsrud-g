<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PyQuest — Python Code Challenge</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --border2: #484f58;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #6e7681;
    --green: #3fb950;
    --green-bg: #0d2119;
    --green-border: #238636;
    --red: #f85149;
    --red-bg: #2d0f0e;
    --red-border: #da3633;
    --blue: #58a6ff;
    --blue-bg: #0c1d2e;
    --blue-border: #1f6feb;
    --amber: #e3b341;
    --amber-bg: #2b1d0a;
    --amber-border: #9e6a03;
    --purple: #a371f7;
    --purple-bg: #1a0e2e;
    --purple-border: #6e40c9;
    --teal: #39d353;
    --teal2: #56d364;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', system-ui, sans-serif;
    --radius: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ── */
  .site-header {
    width: 100%;
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
  }

  .logo {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-icon {
    width: 24px; height: 24px;
    background: linear-gradient(135deg, #58a6ff 0%, #a371f7 100%);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }

  .header-sub {
    font-size: 13px;
    color: var(--text3);
    font-family: var(--mono);
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .gh-link {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text2);
    text-decoration: none;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: border-color 0.15s, color 0.15s;
  }
  .gh-link:hover { border-color: var(--border2); color: var(--text); }

  /* ── Main layout ── */
  .main {
    width: 100%;
    max-width: 780px;
    padding: 2rem 1.5rem;
    flex: 1;
  }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .stat-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 13px;
  }

  .stat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  .stat-val { font-family: var(--mono); font-weight: 600; }
  .stat-lbl { color: var(--text2); font-size: 12px; }
  .c-green { color: var(--green); }
  .c-red { color: var(--red); }
  .c-blue { color: var(--blue); }
  .c-amber { color: var(--amber); }
  .c-purple { color: var(--purple); }
  .dot-green { background: var(--green); }
  .dot-red { background: var(--red); }
  .dot-blue { background: var(--blue); }
  .dot-amber { background: var(--amber); }

  /* ── Progress ── */
  .progress-wrap {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--purple));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── Filter tabs ── */
  .filter-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .tab {
    font-size: 12px;
    font-family: var(--mono);
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab:hover { border-color: var(--border2); color: var(--text); }
  .tab.active { background: var(--blue-bg); border-color: var(--blue-border); color: var(--blue); }
  .tab.active.t-numpy { background: var(--blue-bg); border-color: var(--blue-border); color: var(--blue); }
  .tab.active.t-pandas { background: var(--purple-bg); border-color: var(--purple-border); color: var(--purple); }
  .tab.active.t-nibabel { background: var(--red-bg); border-color: var(--red-border); color: var(--red); }
  .tab.active.t-data { background: var(--amber-bg); border-color: var(--amber-border); color: var(--amber); }
  .tab.active.t-basics { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }

  /* ── Streak banner ── */
  .streak-banner {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--amber-bg);
    border: 1px solid var(--amber-border);
    border-radius: var(--radius);
    margin-bottom: 1rem;
    font-size: 13px;
    font-family: var(--mono);
    color: var(--amber);
  }

  .streak-fire { font-size: 18px; }

  /* ── Question card ── */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 1rem;
  }

  .q-card-header {
    padding: 1rem 1.25rem 0.75rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .cat-badge {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 12px;
    white-space: nowrap;
    margin-top: 2px;
    flex-shrink: 0;
  }

  .cat-basics  { background: var(--green-bg);  border: 1px solid var(--green-border);  color: var(--green); }
  .cat-numpy   { background: var(--blue-bg);   border: 1px solid var(--blue-border);   color: var(--blue); }
  .cat-pandas  { background: var(--purple-bg); border: 1px solid var(--purple-border); color: var(--purple); }
  .cat-nibabel { background: var(--red-bg);    border: 1px solid var(--red-border);    color: var(--red); }
  .cat-data    { background: var(--amber-bg);  border: 1px solid var(--amber-border);  color: var(--amber); }

  .q-prompt {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
  }

  .q-body { padding: 1rem 1.25rem; }

  .q-hint-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }

  .q-hint {
    font-family: var(--mono);
    font-size: 13px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    color: var(--text2);
    line-height: 1.7;
    white-space: pre-wrap;
    margin-bottom: 1rem;
  }

  /* Syntax-ish coloring */
  .kw { color: #ff7b72; }
  .fn { color: #d2a8ff; }
  .st { color: #a5d6ff; }
  .cm { color: #8b949e; font-style: italic; }
  .num { color: #79c0ff; }

  /* ── Options grid ── */
  .options-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 0;
  }

  .opt-btn {
    font-family: var(--mono);
    font-size: 12px;
    text-align: left;
    padding: 9px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    color: var(--text2);
    transition: border-color 0.15s, background 0.15s, color 0.15s;
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.5;
  }

  .opt-btn:hover { border-color: var(--border2); color: var(--text); }
  .opt-btn.hinted { border-color: var(--blue-border); background: var(--blue-bg); color: var(--blue); }

  /* ── Input area ── */
  .input-section { margin-bottom: 1rem; }

  .input-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }

  .type-input {
    width: 100%;
    font-family: var(--mono);
    font-size: 14px;
    padding: 11px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }

  .type-input:focus { border-color: var(--blue-border); box-shadow: 0 0 0 3px rgba(31,111,235,0.15); }
  .type-input.correct { border-color: var(--green-border); background: var(--green-bg); color: var(--green); }
  .type-input.wrong   { border-color: var(--red-border);   background: var(--red-bg);   color: var(--red); }

  .feedback {
    margin-top: 8px;
    font-size: 13px;
    font-family: var(--mono);
    min-height: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .feedback.correct { color: var(--green); }
  .feedback.wrong   { color: var(--red); }
  .feedback.hint    { color: var(--blue); }

  /* ── Explanation ── */
  .explanation {
    display: none;
    margin-top: 1rem;
    padding: 0.875rem 1rem;
    background: var(--surface2);
    border-left: 3px solid var(--blue-border);
    border-radius: 0 var(--radius) var(--radius) 0;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.65;
  }

  .explanation strong { color: var(--text); font-weight: 500; }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 1rem;
  }

  .btn {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    padding: 8px 20px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }

  .btn:hover { background: var(--surface2); border-color: var(--border2); }
  .btn:active { transform: scale(0.98); }

  .btn-primary { background: var(--blue); border-color: var(--blue); color: #fff; }
  .btn-primary:hover { background: #79b8ff; border-color: #79b8ff; }

  .btn-ghost { background: transparent; border-color: var(--border); color: var(--text2); }
  .btn-ghost:hover { color: var(--text); border-color: var(--border2); }

  .q-counter {
    margin-left: auto;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text3);
  }

  /* ── End screen ── */
  #end-screen {
    display: none;
    text-align: center;
    padding: 3rem 1rem;
  }

  .end-pct {
    font-size: 72px;
    font-weight: 700;
    font-family: var(--mono);
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .end-grade { font-size: 16px; color: var(--text2); margin-bottom: 2rem; }

  .end-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 400px;
    margin: 0 auto 2rem;
  }

  .end-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem;
  }

  .end-cell-val { font-size: 28px; font-weight: 700; font-family: var(--mono); }
  .end-cell-lbl { font-size: 12px; color: var(--text2); margin-top: 4px; }

  .cat-breakdown {
    max-width: 400px;
    margin: 0 auto 2rem;
    text-align: left;
  }

  .cat-breakdown-title {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }

  .cat-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 13px;
  }

  .cat-row-name {
    font-family: var(--mono);
    width: 80px;
    color: var(--text2);
    flex-shrink: 0;
  }

  .cat-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .cat-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }

  .cat-row-pct {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    width: 36px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ── Responsive ── */
  @media (max-width: 540px) {
    .options-grid { grid-template-columns: 1fr; }
    .stats-bar { gap: 8px; }
    .end-grid { grid-template-columns: repeat(3, 1fr); }
    .main { padding: 1.5rem 1rem; }
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── Footer ── */
  .site-footer {
    width: 100%;
    border-top: 1px solid var(--border);
    padding: 1rem 2rem;
    font-size: 12px;
    color: var(--text3);
    font-family: var(--mono);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">
    <div class="logo-icon">&#x3E;</div>
    PyQuest
  </div>
  <span class="header-sub">/ python code challenge</span>
  <div class="header-right">
    <a class="gh-link" href="https://github.com" target="_blank">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      GitHub
    </a>
  </div>
</header>

<main class="main">

  <div class="stats-bar">
    <div class="stat-pill">
      <span class="stat-dot dot-green"></span>
      <span class="stat-val c-green" id="stat-correct">0</span>
      <span class="stat-lbl">correct</span>
    </div>
    <div class="stat-pill">
      <span class="stat-dot dot-red"></span>
      <span class="stat-val c-red" id="stat-wrong">0</span>
      <span class="stat-lbl">missed</span>
    </div>
    <div class="stat-pill">
      <span class="stat-dot dot-amber"></span>
      <span class="stat-val c-amber" id="stat-streak">0</span>
      <span class="stat-lbl">streak</span>
    </div>
    <div class="stat-pill" style="margin-left:auto;">
      <span class="stat-dot dot-blue"></span>
      <span class="stat-val c-blue" id="stat-pct">—</span>
      <span class="stat-lbl">accuracy</span>
    </div>
  </div>

  <div class="filter-tabs" id="filter-tabs">
    <button class="tab active" data-cat="all" onclick="setFilter(this,'all')">all topics</button>
    <button class="tab t-basics"  data-cat="basics"  onclick="setFilter(this,'basics')">basics</button>
    <button class="tab t-numpy"   data-cat="numpy"   onclick="setFilter(this,'numpy')">numpy</button>
    <button class="tab t-pandas"  data-cat="pandas"  onclick="setFilter(this,'pandas')">pandas</button>
    <button class="tab t-nibabel" data-cat="nibabel" onclick="setFilter(this,'nibabel')">nibabel</button>
    <button class="tab t-data"    data-cat="data"    onclick="setFilter(this,'data')">data ops</button>
  </div>

  <div class="progress-wrap">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div class="streak-banner" id="streak-banner">
    <span class="streak-fire">&#128293;</span>
    <span id="streak-text"></span>
  </div>

  <!-- Quiz area -->
  <div id="quiz-area">

    <div class="q-card">
      <div class="q-card-header">
        <span class="cat-badge" id="q-cat-badge"></span>
        <p class="q-prompt" id="q-prompt"></p>
      </div>
      <div class="q-body">
        <div class="q-hint-label">context</div>
        <div class="q-hint" id="q-hint"></div>
        <div class="options-label">options — study, then type your answer below</div>
        <div class="options-grid" id="q-options"></div>
      </div>
    </div>

    <div class="input-section">
      <div class="input-label">your answer</div>
      <input class="type-input" id="type-input" placeholder="type the correct line of code..." autocomplete="off" spellcheck="false" />
      <div class="feedback" id="feedback"></div>
      <div class="explanation" id="explanation"></div>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="submit-btn" onclick="submitAnswer()">Check ↵</button>
      <button class="btn" id="next-btn" style="display:none" onclick="nextQuestion()">Next →</button>
      <button class="btn btn-ghost" onclick="showHint()" id="hint-btn">Hint</button>
      <span class="q-counter" id="q-counter"></span>
    </div>
  </div>

  <!-- End screen -->
  <div id="end-screen">
    <div class="end-pct" id="end-pct"></div>
    <div class="end-grade" id="end-grade"></div>
    <div class="end-grid">
      <div class="end-cell">
        <div class="end-cell-val c-green" id="end-correct">0</div>
        <div class="end-cell-lbl">correct</div>
      </div>
      <div class="end-cell">
        <div class="end-cell-val c-red" id="end-wrong">0</div>
        <div class="end-cell-lbl">missed</div>
      </div>
      <div class="end-cell">
        <div class="end-cell-val c-blue" id="end-total">0</div>
        <div class="end-cell-lbl">total</div>
      </div>
    </div>
    <div class="cat-breakdown" id="cat-breakdown"></div>
    <button class="btn btn-primary" onclick="restartGame()">Play Again</button>
  </div>

</main>

<footer class="site-footer">
  <span>PyQuest — python practice tool</span>
  <span id="footer-count"></span>
</footer>

<script>
const QUESTIONS = [
  // ── BASICS ──────────────────────────────────────────────────────────────
  { cat:'basics', label:'basics',
    prompt:'Define a function called `greet` that takes a parameter `name` and returns the string "Hello, " followed by name.',
    hint:'def greet(name):\n    return ...',
    answer:'return "Hello, " + name',
    options:['return "Hello, " + name','print("Hello, " + name)','return f"Hello {name}"','yield "Hello, " + name'],
    explanation:'`return` sends a value back to the caller. `print()` just outputs to the console and returns None.' },

  { cat:'basics', label:'basics',
    prompt:'Create a list called `nums` containing integers 1–5 using a list comprehension.',
    hint:'nums = [... for i in range(...)]',
    answer:'nums = [i for i in range(1, 6)]',
    options:['nums = [i for i in range(1, 6)]','nums = list(range(5))','nums = [i for i in range(5)]','nums = [1,2,3,4,5,6]'],
    explanation:'range(1, 6) produces 1,2,3,4,5. range(5) produces 0–4. The upper bound is exclusive.' },

  { cat:'basics', label:'basics',
    prompt:'Filter even numbers from a list `data` into a new list `evens` using a list comprehension.',
    hint:'evens = [x for x in data if ...]',
    answer:'evens = [x for x in data if x % 2 == 0]',
    options:['evens = [x for x in data if x % 2 == 0]','evens = filter(data, lambda x: x%2)','evens = [x for x in data if x % 2]','evens = data[data % 2 == 0]'],
    explanation:'`x % 2 == 0` tests for even. `x % 2` is truthy for odd numbers — the opposite of what we want.' },

  { cat:'basics', label:'basics',

  { cat:'data', label:'data ops',
    prompt:'Use `functools.reduce` to compute the product of all elements in list `nums`.',
    hint:'from functools import reduce\nproduct = reduce(lambda a, b: a*b, ...)',
    answer:'product = reduce(lambda a, b: a * b, nums)',
    options:['product = reduce(lambda a, b: a * b, nums)','product = reduce(nums, lambda a,b: a*b)','product = functools.reduce(lambda a,b: a*b, nums)','product = sum([a*b for a,b in nums])'],
    explanation:'`reduce(function, iterable)` applies function cumulatively. Argument order is function first, iterable second.' },

  { cat:'data', label:'data ops',
    prompt:'Use a generator expression to lazily compute the sum of squares of list `nums`.',
    hint:'total = sum(x**2 for x in nums)',
    answer:'total = sum(x**2 for x in nums)',
    options:['total = sum(x**2 for x in nums)','total = sum([x**2 for x in nums])','total = sum(map(lambda x: x**2, nums))','total = reduce(lambda a,x: a+x**2, nums, 0)'],
    explanation:'Generator expressions (no brackets) are memory-efficient — values are computed lazily. The list comprehension version builds the full list first.' },

  { cat:'data', label:'data ops',
    prompt:'Read a JSON file "config.json" and parse it into a Python dict `config`.',
    hint:'import json\nwith open("config.json") as f:\n    config = json.load(...)',
    answer:'config = json.load(f)',
    options:['config = json.load(f)','config = json.loads(f)','config = json.read(f)','config = f.json()'],
    explanation:'`json.load(file_obj)` parses from a file. `json.loads(string)` parses from a string. `loads` = "load string".' },

  { cat:'data', label:'data ops',
    prompt:'Use `pathlib.Path` to construct a file path to "results/output.csv" in a platform-independent way.',
    hint:'from pathlib import Path\npath = Path(...) / ...',
    answer:'path = Path("results") / "output.csv"',
    options:['path = Path("results") / "output.csv"','path = "results/output.csv"','path = os.path.join("results", "output.csv")','path = Path("results", "output.csv")'],
    explanation:'The `/` operator on Path objects builds paths cleanly. Both options 1 and 4 work — option 1 is the most readable idiom.' },

  { cat:'data', label:'data ops',
    prompt:'Use a `with` statement to write a list of strings `lines` to file "out.txt", one per line.',
    hint:'with open("out.txt", "w") as f:\n    f.writelines(...)',
    answer:'f.writelines(lines)',
    options:['f.writelines(lines)','f.write(lines)','f.writeline(lines)','f.write("\\n".join(lines))'],
    explanation:'`writelines()` writes each string without adding newlines — include `\\n` in each string. `write()` only takes a single string.' },
];

// ── State ──────────────────────────────────────────────────────────────────
let queue = [], current = null, idx = 0;
let correct = 0, wrong = 0, streak = 0;
let answered = false, hintUsed = false;
let catFilter = 'all';
let catStats = {};  // { cat: { correct, wrong } }

document.getElementById('footer-count').textContent =
  `${QUESTIONS.length} questions across 5 topics`;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function setFilter(btn, cat) {
  catFilter = cat;
  document.querySelectorAll('.tab').forEach(b => {
    b.classList.remove('active');
  });
  btn.classList.add('active');
  restartGame();
}

function restartGame() {
  correct = 0; wrong = 0; streak = 0; idx = 0;
  catStats = {};
  const pool = catFilter === 'all' ? QUESTIONS : QUESTIONS.filter(q => q.cat === catFilter);
  queue = shuffle(pool);
  updateStats();
  document.getElementById('end-screen').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  loadQuestion();
}

function loadQuestion() {
  if (idx >= queue.length) { showEnd(); return; }
  current = queue[idx];
  answered = false;
  hintUsed = false;

  document.getElementById('q-counter').textContent = `${idx + 1} / ${queue.length}`;
  document.getElementById('progress-fill').style.width = `${(idx / queue.length) * 100}%`;

  const badge = document.getElementById('q-cat-badge');
  badge.textContent = current.label;
  badge.className = `cat-badge cat-${current.cat}`;

  document.getElementById('q-prompt').textContent = current.prompt;
  document.getElementById('q-hint').textContent = current.hint;

  const opts = shuffle([...current.options]);
  const grid = document.getElementById('q-options');
  grid.innerHTML = '';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = o;
    btn.onclick = () => {
      if (!answered) {
        document.getElementById('type-input').value = o;
        document.getElementById('type-input').focus();
      }
    };
    grid.appendChild(btn);
  });

  const inp = document.getElementById('type-input');
  inp.value = '';
  inp.className = 'type-input';
  inp.disabled = false;

  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('submit-btn').style.display = '';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('streak-banner').style.display = 'none';

  inp.focus();
}

function norm(s) { return s.trim().replace(/\s+/g, ' '); }

function submitAnswer() {
  if (answered) return;
  const inp = document.getElementById('type-input');
  const val = norm(inp.value);
  const ans = norm(current.answer);
  const fb = document.getElementById('feedback');
  const exp = document.getElementById('explanation');

  if (!val) { fb.textContent = 'type something first'; fb.className = 'feedback hint'; return; }

  if (!catStats[current.cat]) catStats[current.cat] = { correct: 0, wrong: 0 };

  if (val === ans) {
    correct++; streak++;
    catStats[current.cat].correct++;
    answered = true;
    inp.className = 'type-input correct';
    fb.textContent = streak >= 3 ? `correct!  ${streak} in a row` : 'correct!';
    fb.className = 'feedback correct';
    if (streak >= 3) {
      document.getElementById('streak-text').textContent = `${streak}-answer streak — keep it up!`;
      document.getElementById('streak-banner').style.display = 'flex';
    }
  } else {
    wrong++; streak = 0;
    catStats[current.cat].wrong++;
    answered = true;
    inp.className = 'type-input wrong';
    fb.innerHTML = `missed &mdash; answer: <strong style="color:var(--red)">${current.answer}</strong>`;
    fb.className = 'feedback wrong';
  }

  exp.textContent = current.explanation;
  exp.style.display = 'block';
  document.getElementById('submit-btn').style.display = 'none';
  document.getElementById('next-btn').style.display = '';
  inp.disabled = true;
  updateStats();
}

function showHint() {
  if (answered || hintUsed) return;
  hintUsed = true;
  const ans = norm(current.answer);
  document.querySelectorAll('.opt-btn').forEach(b => {
    if (norm(b.textContent) === ans) b.classList.add('hinted');
  });
  const fb = document.getElementById('feedback');
  fb.textContent = 'hint: the correct option is highlighted';
  fb.className = 'feedback hint';
}

function nextQuestion() { idx++; loadQuestion(); }

function updateStats() {
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-streak').textContent = streak;
  const total = correct + wrong;
  document.getElementById('stat-pct').textContent =
    total > 0 ? Math.round((correct / total) * 100) + '%' : '—';
}

function showEnd() {
  document.getElementById('quiz-area').style.display = 'none';
  const end = document.getElementById('end-screen');
  end.style.display = 'block';

  const total = correct + wrong;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  const pctEl = document.getElementById('end-pct');
  pctEl.textContent = pct + '%';
  pctEl.style.color = pct >= 80 ? 'var(--green)' : pct >= 60 ? 'var(--amber)' : 'var(--red)';

  const grades = [
    [90,'Outstanding — Python expert territory'],
    [80,'Great work — solid Python skills'],
    [70,'Good — a few gaps to revisit'],
    [60,'Getting there — keep practicing'],
    [0,'Keep studying — you\'ll get there!']
  ];
  document.getElementById('end-grade').textContent =
    grades.find(([t]) => pct >= t)[1];

  document.getElementById('end-correct').textContent = correct;
  document.getElementById('end-wrong').textContent = wrong;
  document.getElementById('end-total').textContent = total;

  const bd = document.getElementById('cat-breakdown');
  const cats = ['basics','numpy','pandas','nibabel','data'];
  const catNames = { basics:'basics', numpy:'numpy', pandas:'pandas', nibabel:'nibabel', data:'data ops' };
  const catColors = { basics:'var(--green)', numpy:'var(--blue)', pandas:'var(--purple)', nibabel:'var(--red)', data:'var(--amber)' };

  let html = '<div class="cat-breakdown-title">by topic</div>';
  cats.forEach(c => {
    const s = catStats[c] || { correct: 0, wrong: 0 };
    const t = s.correct + s.wrong;
    if (t === 0) return;
    const p = Math.round((s.correct / t) * 100);
    html += `<div class="cat-row">
      <span class="cat-row-name">${catNames[c]}</span>
      <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${p}%;background:${catColors[c]}"></div></div>
      <span class="cat-row-pct">${p}%</span>
    </div>`;
  });
  bd.innerHTML = html;

  document.getElementById('progress-fill').style.width = '100%';
}

document.getElementById('type-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (answered) nextQuestion();
    else submitAnswer();
  }
});

restartGame();
</script>

</html>
